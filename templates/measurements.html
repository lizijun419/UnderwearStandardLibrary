<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内裤尺寸数据</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', '微软雅黑', sans-serif;
            background: #f0f2f5;
            padding: 30px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 35px 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        h2 {
            color: #0f172a;
            border-left: 5px solid #f59e0b;
            padding-left: 15px;
            margin-bottom: 25px;
        }
        .note-box {
            padding: 30px;
            text-align: center;
            background: #f8fafc;
            border-radius: 12px;
            color: #64748b;
            font-size: 16px;
        }
        .note-box .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← 返回</a>
        <h2>📏 尺寸数据</h2>
        <div class="note-box">
            <span class="icon">📊</span>
            <p>尺寸数据功能开发中</p>
            <p style="font-size:14px;color:#94a3b8;margin-top:8px;">后续将支持 XS~XL 多尺码部位尺寸录入与查看</p>
        </div>
    </div>
</body>
</html>
